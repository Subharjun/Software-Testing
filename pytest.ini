[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit:          Pure unit tests — no network or disk I/O
    integration:   API-level tests using Flask test client
    e2e:           Full browser tests via Playwright
    security:      Security-focused tests
    slow:          Tests that take > 1 second

# Coverage defaults (override per run as needed)
# pytest --cov=backend --cov-report=html:reports/coverage_html

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
